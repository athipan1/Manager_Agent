      - name: Test Manager alpha market strategy route

        working-directory: Manager_Agent

        run: |

          docker compose --profile backtest exec -T manager-agent python - <<'PY'

          import json

          import urllib.request

          payload = {

              "symbol": "SPY",

              "price": 550,

              "sma_50": 530,

              "sma_200": 500,

              "atr_pct": 0.015,

              "vix": 15,

              "market_breadth_pct": 0.70,

          }

          request = urllib.request.Request(

              "http://localhost:80/alpha/market-strategy",

              data=json.dumps(payload).encode("utf-8"),

              headers={"Content-Type": "application/json"},

              method="POST",

          )

          with urllib.request.urlopen(request, timeout=10) as response:

              body = json.loads(response.read().decode("utf-8"))

          assert body.get("status") == "success", body

          data = body.get("data") or {}

          recommendation = data.get("recommendation") or {}

          assert data.get("enabled") is True, data

          assert recommendation.get("regime") == "bull", recommendation

          assert recommendation.get("recommended_strategy") == "trend_following", recommendation

          assert recommendation.get("position_size_multiplier") == 1.0, recommendation

          print("Manager alpha market strategy smoke passed.")

          PY

      - name: Test Manager regime backtest plan route

