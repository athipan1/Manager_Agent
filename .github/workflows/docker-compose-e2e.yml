          request = urllib.request.Request(

              "http://localhost:80/alpha/regime-backtest-plan",

              data=json.dumps(payload).encode("utf-8"),

              headers={"Content-Type": "application/json"},

              method="POST",

          )

          with urllib.request.urlopen(request, timeout=10) as response:

              body = json.loads(response.read().decode("utf-8"))

          assert body.get("status") == "success", body

          data = body.get("data") or {}

          market_strategy = data.get("market_strategy") or {}

          plan = data.get("plan") or {}

          assert data.get("enabled") is True, data

          assert market_strategy.get("enabled") is True, market_strategy

          assert plan.get("action") == "compare", plan

          assert plan.get("recommendation", {}).get("regime") == "bull", plan

          assert plan.get("recommendation", {}).get("recommended_strategy") == "trend_following", plan

          compare_payload = plan.get("backtest_compare_payload") or {}

          assert compare_payload.get("symbols") == ["AAPL"], compare_payload

          assert compare_payload.get("max_position_pct") == 0.10, compare_payload

          assert "strategy" not in compare_payload, compare_payload

          assert "fast_window" not in compare_payload, compare_payload

          assert "slow_window" not in compare_payload, compare_payload

          candidates = compare_payload.get("candidates") or []

          assert len(candidates) == 4, candidates

          assert candidates[0].get("strategy") == "trend_following", candidates

          expected = {"sma_crossover", "trend_following", "mean_reversion", "breakout"}

          strategies = {candidate.get("strategy") for candidate in candidates}

          assert expected.issubset(strategies), strategies

          print("Manager regime backtest plan smoke passed.")

