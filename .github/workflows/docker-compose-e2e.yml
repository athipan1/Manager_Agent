name: Docker Compose E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-compose-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout Manager_Agent
        uses: actions/checkout@v4
        with:
          path: Manager_Agent

      - name: Checkout Scanner_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Scanner_Agent
          path: Scanner_Agent

      - name: Checkout Technical_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Technical_Agent
          path: Technical_Agent

      - name: Checkout Fundamental_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Fundamental_Agent
          path: Fundamental_Agent

      - name: Checkout Database_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Database_Agent
          path: Database_Agent

      - name: Checkout Learning_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Learning_Agent
          path: Learning_Agent

      - name: Checkout Execution_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Execution_Agent
          path: Execution_Agent

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate compose file
        working-directory: Manager_Agent
        run: |
          docker compose config

      - name: Build and start stack
        working-directory: Manager_Agent
        run: |
          set +e
          docker compose up --build -d 2>&1 | tee compose-up.log
          status=${PIPESTATUS[0]}
          if [ "$status" != "0" ]; then
            echo "docker compose up failed with status $status"
            echo "---- docker compose ps ----"
            docker compose ps || true
            for service in database-agent technical-agent scanner-agent fundamental-agent learning-agent execution-agent manager-agent db; do
              echo "---- ${service} logs tail ----"
              docker compose logs --tail=160 "$service" || true
            done
            exit "$status"
          fi

      - name: Wait for services to become healthy
        working-directory: Manager_Agent
        run: |
          for i in {1..60}; do
            docker compose ps
            exited=$(docker compose ps --status exited -q | wc -l | tr -d ' ')
            if [ "$exited" != "0" ]; then
              echo "One or more containers exited."
              for service in database-agent technical-agent scanner-agent fundamental-agent learning-agent execution-agent manager-agent db; do
                echo "---- ${service} logs tail ----"
                docker compose logs --tail=160 "$service" || true
              done
              exit 1
            fi

            manager=$(curl -fsS http://localhost:8000/health >/dev/null && echo ok || echo wait)
            fundamental=$(curl -fsS http://localhost:8001/health >/dev/null && echo ok || echo wait)
            technical=$(curl -fsS http://localhost:8002/health >/dev/null && echo ok || echo wait)
            scanner=$(curl -fsS http://localhost:8003/health >/dev/null && echo ok || echo wait)
            database=$(curl -fsS http://localhost:8004/health >/dev/null && echo ok || echo wait)
            learning=$(curl -fsS http://localhost:8005/health >/dev/null && echo ok || echo wait)
            execution=$(curl -fsS http://localhost:8006/health >/dev/null && echo ok || echo wait)

            echo "health: manager=$manager fundamental=$fundamental technical=$technical scanner=$scanner database=$database learning=$learning execution=$execution"
            if [ "$manager$fundamental$technical$scanner$database$learning$execution" = "okokokokokokok" ]; then
              echo "All services are reachable."
              exit 0
            fi
            sleep 5
          done
          echo "Services did not become reachable in time."
          docker compose ps
          for service in database-agent technical-agent scanner-agent fundamental-agent learning-agent execution-agent manager-agent db; do
            echo "---- ${service} logs tail ----"
            docker compose logs --tail=160 "$service" || true
          done
          exit 1

      - name: Check health endpoints
        run: |
          curl -f http://localhost:8000/health
          curl -f http://localhost:8001/health
          curl -f http://localhost:8002/health
          curl -f http://localhost:8003/health
          curl -f http://localhost:8004/health
          curl -f http://localhost:8005/health
          curl -f http://localhost:8006/health

      - name: Test Scanner Agent
        run: |
          curl -f -X POST http://localhost:8003/scan \
            -H "Content-Type: application/json" \
            -d '{"symbols":["AAPL","MSFT"],"screener":"default","exchange":"NASDAQ"}'

      - name: Test Execution Agent Simulator
        run: |
          curl -f -X POST http://localhost:8006/execute \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: dev_execution_key" \
            -H "Idempotency-Key: github-actions-e2e-test" \
            -d '{
              "account_id": 1,
              "symbol": "AAPL",
              "side": "buy",
              "quantity": 1,
              "order_type": "market",
              "time_in_force": "day",
              "trade_id": "github-actions-e2e-test"
            }'

      - name: Show logs on failure
        if: failure()
        working-directory: Manager_Agent
        run: |
          docker compose ps || true
          for service in database-agent technical-agent scanner-agent fundamental-agent learning-agent execution-agent manager-agent db; do
            echo "---- ${service} logs tail ----"
            docker compose logs --tail=160 "$service" || true
          done
          if [ -f compose-up.log ]; then tail -200 compose-up.log; fi

      - name: Stop stack
        if: always()
        working-directory: Manager_Agent
        run: |
          docker compose down -v || true
