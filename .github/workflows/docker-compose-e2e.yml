              ]

            }

          }

          JSON

          curl -f -X POST http://localhost:8016/backtest/compare -H "Content-Type: application/json" --data-binary @/tmp/backtest_compare_payload.json | tee /tmp/backtest_compare_response.json

          python - <<'PY'

          import json

          from pathlib import Path

          response = json.loads(Path("/tmp/backtest_compare_response.json").read_text())

          assert response.get("status") == "success", response

          data = response.get("data") or {}

          ranked_results = data.get("ranked_results") or []

          assert len(ranked_results) == 4, data

          assert data.get("best") is not None, data

          strategies = {item.get("strategy") for item in ranked_results}

          expected = {"sma_crossover", "trend_following", "mean_reversion", "breakout"}

          assert expected.issubset(strategies), strategies

          print("Backtest compare smoke passed.")

          PY

      - name: Test Market Regime Agent strategy endpoint

        run: |

          cat > /tmp/market_strategy_payload.json <<'JSON'

