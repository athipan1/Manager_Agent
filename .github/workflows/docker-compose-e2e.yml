name: Docker Compose E2E

on:

  workflow_dispatch:

  push:

    branches:

      - main

  pull_request:

    branches:

      - main

jobs:

  docker-compose-e2e:

    runs-on: ubuntu-latest

    timeout-minutes: 35

    env:

      BACKTEST_AGENT_ENABLED: "true"

      RUNTIME_SERVICES: database-agent technical-agent scanner-agent fundamental-agent risk-agent backtest-agent performance-agent learning-agent execution-agent manager-agent db

    steps:

      - name: Checkout Manager_Agent

        uses: actions/checkout@v4

        with:

          path: Manager_Agent

      - name: Checkout Scanner_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Scanner_Agent

          path: Scanner_Agent

      - name: Checkout Technical_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Technical_Agent

          path: Technical_Agent

      - name: Checkout Fundamental_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Fundamental_Agent

          path: Fundamental_Agent

      - name: Checkout Database_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Database_Agent

          path: Database_Agent

      - name: Checkout Risk_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Risk_Agent

          path: Risk_Agent

      - name: Checkout Backtest_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Backtest_Agent

          path: Backtest_Agent

      - name: Checkout Performance_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Performance_Agent

          path: Performance_Agent

      - name: Checkout Learning_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Learning_Agent

          path: Learning_Agent

      - name: Checkout Execution_Agent

        uses: actions/checkout@v4

        with:

          repository: athipan1/Execution_Agent

          path: Execution_Agent

      - name: Show Docker versions

        run: |

          docker --version

          docker compose version

      - name: Validate compose file

        working-directory: Manager_Agent

        run: |

          docker compose --profile backtest config

      - name: Build and start stack

        working-directory: Manager_Agent

        run: |

          set +e

          docker compose --profile backtest up --build -d 2>&1 | tee compose-up.log

          status=${PIPESTATUS[0]}

          if [ "$status" != "0" ]; then

            echo "docker compose up failed with status $status"

            echo "---- docker compose ps ----"

            docker compose --profile backtest ps || true

            for service in $RUNTIME_SERVICES; do

              echo "---- ${service} logs tail ----"

              docker compose --profile backtest logs --tail=160 "$service" || true

            done

            exit "$status"

          fi

      - name: Wait for services to become healthy

        working-directory: Manager_Agent

        run: |

          for i in {1..60}; do

            docker compose --profile backtest ps

            exited=$(docker compose --profile backtest ps --status exited -q $RUNTIME_SERVICES | wc -l | tr -d ' ')

            if [ "$exited" != "0" ]; then

              echo "One or more runtime containers exited."

              for service in $RUNTIME_SERVICES; do

                echo "---- ${service} logs tail ----"

                docker compose --profile backtest logs --tail=160 "$service" || true

              done

              exit 1

            fi

            manager=$(docker compose --profile backtest exec -T manager-agent python /app/healthcheck.py >/dev/null && echo ok || echo wait)

            fundamental=$(curl -fsS http://localhost:8001/health >/dev/null && echo ok || echo wait)

            technical=$(curl -fsS http://localhost:8002/health >/dev/null && echo ok || echo wait)

            scanner=$(curl -fsS http://localhost:8003/health >/dev/null && echo ok || echo wait)

            database=$(curl -fsS http://localhost:8004/health >/dev/null && echo ok || echo wait)

            risk=$(curl -fsS http://localhost:8007/health >/dev/null && echo ok || echo wait)

            backtest=$(curl -fsS http://localhost:8016/health >/dev/null && echo ok || echo wait)

            performance=$(curl -fsS http://localhost:8013/health >/dev/null && echo ok || echo wait)

            learning=$(curl -fsS http://localhost:8005/health >/dev/null && echo ok || echo wait)

            execution=$(curl -fsS http://localhost:8006/health >/dev/null && echo ok || echo wait)

            echo "health: manager=$manager fundamental=$fundamental technical=$technical scanner=$scanner database=$database risk=$risk backtest=$backtest performance=$performance learning=$learning execution=$execution"

            if [ "$manager$fundamental$technical$scanner$database$risk$backtest$performance$learning$execution" = "okokokokokokokokokok" ]; then

              echo "All services are reachable."

              exit 0

            fi

            sleep 5

          done

          echo "Services did not become reachable in time."

          docker compose --profile backtest ps

          for service in $RUNTIME_SERVICES; do

            echo "---- ${service} logs tail ----"

            docker compose --profile backtest logs --tail=160 "$service" || true

          done

          exit 1

      - name: Check health endpoints

        working-directory: Manager_Agent

        run: |

          docker compose --profile backtest exec -T manager-agent python /app/healthcheck.py

          curl -f http://localhost:8001/health

          curl -f http://localhost:8002/health

          curl -f http://localhost:8003/health

          curl -f http://localhost:8004/health

          curl -f http://localhost:8007/health

          curl -f http://localhost:8016/health

          curl -f http://localhost:8013/health

          curl -f http://localhost:8005/health

          curl -f http://localhost:8006/health

      - name: Test Scanner Agent

        run: |

          curl -f -X POST http://localhost:8003/scan -H "Content-Type: application/json" -d '{"symbols":["AAPL","MSFT"],"screener":"america","exchange":"NASDAQ"}'

      - name: Test Backtest Agent health

        run: |

          curl -f http://localhost:8016/health

      - name: Test Backtest Agent run endpoint

        run: |

          cat > /tmp/backtest_payload.json <<'JSON'

          {

            "symbols": ["AAPL"],

            "initial_equity": 100000,

            "strategy": "sma_crossover",

            "fast_window": 2,

            "slow_window": 3,

            "risk_per_trade": 0.01,

            "max_position_pct": 0.10,

            "fee_bps": 1,

            "slippage_bps": 1,

            "use_risk_agent": true,

            "bars": {

              "AAPL": [

                {"timestamp":"2026-01-01T00:00:00Z","open":100,"high":101,"low":99,"close":100,"volume":1000},

                {"timestamp":"2026-01-02T00:00:00Z","open":100,"high":102,"low":99,"close":101,"volume":1000},

                {"timestamp":"2026-01-03T00:00:00Z","open":101,"high":103,"low":100,"close":102,"volume":1000},

                {"timestamp":"2026-01-04T00:00:00Z","open":102,"high":104,"low":101,"close":103,"volume":1000},

                {"timestamp":"2026-01-05T00:00:00Z","open":103,"high":105,"low":102,"close":104,"volume":1000},

                {"timestamp":"2026-01-06T00:00:00Z","open":104,"high":105,"low":100,"close":101,"volume":1000},

                {"timestamp":"2026-01-07T00:00:00Z","open":101,"high":102,"low":97,"close":98,"volume":1000},

                {"timestamp":"2026-01-08T00:00:00Z","open":98,"high":99,"low":95,"close":96,"volume":1000}

              ]

            }

          }

          JSON

          curl -f -X POST http://localhost:8016/backtest/run -H "Content-Type: application/json" --data-binary @/tmp/backtest_payload.json | tee /tmp/backtest_run_response.json

          python - <<'PY'

          import json

          from pathlib import Path

          response = json.loads(Path("/tmp/backtest_run_response.json").read_text())

          assert response.get("status") == "success", response

          data = response.get("data") or {}

          assert "metrics" in data, data

          assert "equity_curve" in data, data

          print("Backtest run smoke passed.")

          PY

      - name: Test Backtest Agent compare endpoint

        run: |

          cat > /tmp/backtest_compare_payload.json <<'JSON'

          {

            "symbols": ["AAPL"],

            "initial_equity": 100000,

            "risk_per_trade": 0.01,

            "max_position_pct": 0.10,

            "fee_bps": 1,

            "slippage_bps": 1,

            "use_risk_agent": true,

            "candidates": [

              {

                "name": "sma_fast",

                "strategy": "sma_crossover",

                "fast_window": 2,

                "slow_window": 3

              },

              {

                "name": "trend_following",

                "strategy": "trend_following",

                "fast_window": 2,

                "slow_window": 3

              },

              {

                "name": "mean_reversion",

                "strategy": "mean_reversion",

                "fast_window": 2,

                "slow_window": 3

              },

              {

                "name": "breakout",

                "strategy": "breakout",

                "fast_window": 2,

                "slow_window": 3

              }

            ],

            "bars": {

              "AAPL": [

                {"timestamp":"2026-01-01T00:00:00Z","open":100,"high":101,"low":99,"close":100,"volume":1000},

                {"timestamp":"2026-01-02T00:00:00Z","open":100,"high":102,"low":99,"close":101,"volume":1000},

                {"timestamp":"2026-01-03T00:00:00Z","open":101,"high":103,"low":100,"close":102,"volume":1000},

                {"timestamp":"2026-01-04T00:00:00Z","open":102,"high":104,"low":101,"close":103,"volume":1000},

                {"timestamp":"2026-01-05T00:00:00Z","open":103,"high":105,"low":102,"close":104,"volume":1000},

                {"timestamp":"2026-01-06T00:00:00Z","open":104,"high":105,"low":100,"close":101,"volume":1000},

                {"timestamp":"2026-01-07T00:00:00Z","open":101,"high":102,"low":97,"close":98,"volume":1000},

                {"timestamp":"2026-01-08T00:00:00Z","open":98,"high":99,"low":95,"close":96,"volume":1000},

                {"timestamp":"2026-01-09T00:00:00Z","open":96,"high":98,"low":94,"close":97,"volume":1000},

                {"timestamp":"2026-01-10T00:00:00Z","open":97,"high":101,"low":96,"close":100,"volume":1000},

                {"timestamp":"2026-01-11T00:00:00Z","open":100,"high":104,"low":99,"close":103,"volume":1000},

                {"timestamp":"2026-01-12T00:00:00Z","open":103,"high":106,"low":102,"close":105,"volume":1000}

              ]

            }

          }

          JSON

          curl -f -X POST http://localhost:8016/backtest/compare -H "Content-Type: application/json" --data-binary @/tmp/backtest_compare_payload.json | tee /tmp/backtest_compare_response.json

          python - <<'PY'

          import json

          from pathlib import Path

          response = json.loads(Path("/tmp/backtest_compare_response.json").read_text())

          assert response.get("status") == "success", response

          data = response.get("data") or {}

          ranked_results = data.get("ranked_results") or []

          assert len(ranked_results) == 4, data

          assert data.get("best") is not None, data

          strategies = {item.get("strategy") for item in ranked_results}

          expected = {"sma_crossover", "trend_following", "mean_reversion", "breakout"}

          assert expected.issubset(strategies), strategies

          print("Backtest compare smoke passed.")

          PY

      - name: Test Performance session risk endpoint

        run: |

          curl -f -X POST http://localhost:8013/performance/session-risk -H "Content-Type: application/json" -d '{"account_id":1,"symbol":"AAPL","equity":100000,"fills":[]}'

      - name: Test Execution Agent broker reconciliation

        run: |

          curl -f -X POST 'http://localhost:8006/broker/reconcile?account_id=1&push_to_database=true' -H "X-API-KEY: dev_execution_key"

          curl -f 'http://localhost:8004/broker-sync/status?account_id=1' -H "X-API-KEY: dev_database_key"

      - name: Show logs on failure

        if: failure()

        working-directory: Manager_Agent

        run: |

          docker compose --profile backtest ps || true

          for service in $RUNTIME_SERVICES; do

            echo "---- ${service} logs tail ----"

            docker compose --profile backtest logs --tail=160 "$service" || true

          done

          if [ -f compose-up.log ]; then

            tail -200 compose-up.log

          fi

      - name: Stop stack

        if: always()

        working-directory: Manager_Agent

        run: |

          docker compose --profile backtest down -v || true