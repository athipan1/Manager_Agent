name: Docker Compose Config Check

on:
  push:
  pull_request:

jobs:
  compose-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Validate base Compose configuration
        run: docker compose config --quiet

      - name: Validate Broker Sync override
        run: >-
          docker compose
          -f docker-compose.yml
          -f docker-compose.broker-sync.yml
          config --quiet

      - name: Validate optional profiles
        run: |
          docker compose --profile backtest config --quiet
          docker compose --profile market-regime config --quiet
