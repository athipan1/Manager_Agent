name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade wheel setuptools
        pip install -r requirements.txt

    - name: Compile Python and validate hourly compose contracts
      env:
        ALPACA_API_KEY_ID: ci-paper-key
        ALPACA_SECRET_KEY: ci-paper-secret
        ALPACA_API_URL: https://paper-api.alpaca.markets
        EXECUTION_API_KEY: ci-execution-key
        DATABASE_AGENT_URL: https://database-agent.example.invalid
        DATABASE_AGENT_API_KEY: ci-database-key
        RISK_ADMIN_TOKEN: ci-risk-token
        PORTFOLIO_AGENT_API_KEY: ci-portfolio-key
        PROFIT_AGENT_API_KEY: ci-profit-key
      run: |
        python -m compileall -q .
        docker compose --profile backtest -f docker-compose.yml -f docker-compose.risk.yml -f docker-compose.alpha.yml -f docker-compose.hourly-paper.yml config --quiet
        docker compose --profile backtest -f docker-compose.yml -f docker-compose.risk.yml -f docker-compose.alpha.yml -f docker-compose.hourly-simulator.yml config --quiet

    - name: Run tests with pytest
      id: pytest
      continue-on-error: true
      run: |
        PYTHONPATH=. python -m pytest --maxfail=5 --disable-warnings -q > pytest-results.txt 2>&1

    - name: Upload pytest results
      if: always() && hashFiles('pytest-results.txt') != ''
      uses: actions/upload-artifact@v4
      with:
        name: manager-pytest-results
        path: pytest-results.txt
        if-no-files-found: error

    - name: Fail when pytest fails
      if: steps.pytest.outcome == 'failure'
      run: |
        cat pytest-results.txt
        exit 1
