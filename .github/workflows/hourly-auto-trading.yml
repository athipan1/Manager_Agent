name: Hourly Auto Trading
run-name: Hourly Alpaca Paper Portfolio · ${{ github.event_name }} · #${{ github.run_number }}

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Safety default; false is required for Alpaca Paper execution"
        required: true
        type: boolean
        default: true
      broker_mode:
        description: "Manual dry runs default to Simulator"
        required: true
        type: choice
        options:
          - SIMULATOR
          - ALPACA
        default: SIMULATOR
      max_universe:
        description: "Maximum Scanner universe"
        required: false
        default: "1000"
      top_n:
        description: "Candidate count passed to exact Backtest"
        required: false
        default: "10"
      min_final_score:
        description: "Minimum Manager opportunity score"
        required: false
        default: "0.55"
  schedule:
    - cron: "5 * * * *"

concurrency:
  group: hourly-alpaca-paper-portfolio
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  hourly-portfolio-cycle:
    if: github.event_name != 'schedule' || vars.HOURLY_PAPER_SCHEDULE_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      TRADING_ENABLED: "true"
      TRADING_MODE: PAPER
      BROKER_MODE: ${{ github.event_name == 'schedule' && 'ALPACA' || inputs.broker_mode }}
      DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run }}
      ALLOW_LIVE_TRADING: "false"
      BACKTEST_EXECUTION_GATE_REQUIRED: "true"
      BROKER_RECONCILE_REQUIRED: "true"
      BROKER_RECONCILE_CONTEXT_REQUIRED: "true"
      PERFORMANCE_SESSION_RISK_REQUIRED: "true"
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_API_URL: ${{ secrets.ALPACA_API_URL }}
      EXECUTION_API_KEY: ${{ secrets.EXECUTION_API_KEY }}
      DATABASE_AGENT_URL: ${{ secrets.DATABASE_AGENT_URL }}
      DATABASE_AGENT_API_KEY: ${{ secrets.DATABASE_AGENT_API_KEY }}
      RISK_ADMIN_TOKEN: ${{ secrets.RISK_ADMIN_TOKEN }}
      PORTFOLIO_AGENT_API_KEY: ${{ secrets.PORTFOLIO_AGENT_API_KEY }}
      PROFIT_AGENT_API_KEY: ${{ secrets.PROFIT_AGENT_API_KEY }}
      DEFAULT_ACCOUNT_ID: "1"
      HOURLY_MAX_UNIVERSE: ${{ inputs.max_universe || '1000' }}
      HOURLY_TOP_N: ${{ inputs.top_n || '10' }}
      HOURLY_MIN_FINAL_SCORE: ${{ inputs.min_final_score || '0.55' }}
      BACKTEST_ENABLED: "true"
      BACKTEST_SKILL_ID: ${{ vars.BACKTEST_SKILL_ID || 'hourly-sma-crossover' }}
      BACKTEST_STRATEGY_ID: ${{ vars.BACKTEST_STRATEGY_ID || 'hourly-sma-crossover' }}
      BACKTEST_TIMEFRAME: ${{ vars.BACKTEST_TIMEFRAME || '1d' }}
      BACKTEST_MINIMUM_BARS: ${{ vars.BACKTEST_MINIMUM_BARS || '252' }}
      BACKTEST_BAR_LIMIT: ${{ vars.BACKTEST_BAR_LIMIT || '10000' }}
      BACKTEST_INITIAL_EQUITY: ${{ vars.BACKTEST_INITIAL_EQUITY || '100000' }}
      BACKTEST_STRATEGY: ${{ vars.BACKTEST_STRATEGY || 'sma_crossover' }}
      BACKTEST_FAST_WINDOW: ${{ vars.BACKTEST_FAST_WINDOW || '2' }}
      BACKTEST_SLOW_WINDOW: ${{ vars.BACKTEST_SLOW_WINDOW || '3' }}
      BACKTEST_FEE_BPS: ${{ vars.BACKTEST_FEE_BPS || '10' }}
      BACKTEST_SLIPPAGE_BPS: ${{ vars.BACKTEST_SLIPPAGE_BPS || '5' }}
      ALPACA_DATA_API_URL: https://data.alpaca.markets
      ALPACA_DATA_FEED: iex
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout Manager_Agent
        uses: actions/checkout@v4
        with:
          path: Manager_Agent

      - name: Validate Paper-only runtime and external dependencies
        id: preflight
        working-directory: Manager_Agent
        run: python scripts/hourly_paper_preflight.py

      - name: Configure isolated runtime stack
        working-directory: Manager_Agent
        run: |
          if [ "${{ steps.preflight.outputs.paper_automation }}" = "true" ]; then
            echo "COMPOSE_FILE=docker-compose.yml:docker-compose.risk.yml:docker-compose.alpha.yml:docker-compose.hourly-paper.yml" >> "$GITHUB_ENV"
            echo "RUNTIME_DATABASE_AGENT_URL=${DATABASE_AGENT_URL}" >> "$GITHUB_ENV"
            echo "EXECUTE_PAPER_PROTECTION_RECONCILIATION=true" >> "$GITHUB_ENV"
          else
            python scripts/configure_simulator_runtime.py
            echo "COMPOSE_FILE=docker-compose.yml:docker-compose.risk.yml:docker-compose.alpha.yml:docker-compose.hourly-simulator.yml" >> "$GITHUB_ENV"
            echo "RUNTIME_DATABASE_AGENT_URL=http://localhost:8004" >> "$GITHUB_ENV"
            echo "EXECUTE_PAPER_PROTECTION_RECONCILIATION=false" >> "$GITHUB_ENV"
          fi
          echo "PORTFOLIO_CYCLE_ID=${{ steps.preflight.outputs.portfolio_cycle_id }}" >> "$GITHUB_ENV"

      - name: Checkout Scanner_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Scanner_Agent
          ref: main
          path: Scanner_Agent
          fetch-depth: 1

      - name: Checkout Technical_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Technical_Agent
          ref: main
          path: Technical_Agent
          fetch-depth: 1

      - name: Checkout Fundamental_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Fundamental_Agent
          ref: main
          path: Fundamental_Agent
          fetch-depth: 1

      - name: Checkout Backtest_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Backtest_Agent
          ref: main
          path: Backtest_Agent
          fetch-depth: 1

      - name: Checkout Execution_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Execution_Agent
          ref: main
          path: Execution_Agent
          fetch-depth: 1

      - name: Checkout Risk_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Risk_Agent
          ref: main
          path: Risk_Agent
          fetch-depth: 1

      - name: Checkout Portfolio_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Portfolio_Agent
          ref: main
          path: Portfolio_Agent
          fetch-depth: 1

      - name: Checkout Profit_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Profit_Agent
          ref: main
          path: Profit_Agent
          fetch-depth: 1

      - name: Checkout Performance_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Performance_Agent
          ref: main
          path: Performance_Agent
          fetch-depth: 1

      - name: Checkout Market_Regime_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Market_Regime_Agent
          ref: main
          path: Market_Regime_Agent
          fetch-depth: 1

      - name: Checkout local-only dependencies for Simulator dry run
        if: steps.preflight.outputs.paper_automation != 'true'
        uses: actions/checkout@v4
        with:
          repository: athipan1/Database_Agent
          ref: main
          path: Database_Agent
          fetch-depth: 1

      - name: Checkout Learning_Agent for Simulator dry run
        if: steps.preflight.outputs.paper_automation != 'true'
        uses: actions/checkout@v4
        with:
          repository: athipan1/Learning_Agent
          ref: main
          path: Learning_Agent
          fetch-depth: 1

      - name: Validate compose model before startup
        working-directory: Manager_Agent
        run: docker compose --profile backtest config --quiet

      - name: Start required agent stack
        working-directory: Manager_Agent
        run: |
          docker compose --profile backtest up --build -d \
            scanner-agent technical-agent fundamental-agent risk-agent \
            backtest-agent market-regime-agent portfolio-agent profit-agent \
            performance-agent execution-agent manager-agent

      - name: Wait for required services
        working-directory: Manager_Agent
        env:
          MANAGER_AGENT_URL: http://localhost:8000
          TECHNICAL_AGENT_URL: http://localhost:8002
          FUNDAMENTAL_AGENT_URL: http://localhost:8001
          MARKET_REGIME_AGENT_URL: http://localhost:8014
          PORTFOLIO_AGENT_URL: http://localhost:8012
          PROFIT_AGENT_URL: http://localhost:8011
          PERFORMANCE_AGENT_URL: http://localhost:8013
          EXECUTION_AGENT_URL: http://localhost:8006
          DATABASE_AGENT_URL: ${{ env.RUNTIME_DATABASE_AGENT_URL }}
        run: python scripts/hourly_portfolio_cycle.py wait

      - name: Review existing positions, orders, regime, exposure and protection
        working-directory: Manager_Agent
        env:
          MANAGER_AGENT_URL: http://localhost:8000
          TECHNICAL_AGENT_URL: http://localhost:8002
          FUNDAMENTAL_AGENT_URL: http://localhost:8001
          MARKET_REGIME_AGENT_URL: http://localhost:8014
          PORTFOLIO_AGENT_URL: http://localhost:8012
          PROFIT_AGENT_URL: http://localhost:8011
          PERFORMANCE_AGENT_URL: http://localhost:8013
          EXECUTION_AGENT_URL: http://localhost:8006
          DATABASE_AGENT_URL: ${{ env.RUNTIME_DATABASE_AGENT_URL }}
        run: python scripts/hourly_portfolio_cycle.py prepare

      - name: Reconcile exact Paper protective orders
        if: steps.preflight.outputs.paper_automation == 'true'
        working-directory: Manager_Agent
        env:
          EXECUTION_AGENT_URL: http://localhost:8006
          RISK_AGENT_URL: http://localhost:8007
          PROTECTION_REPORT_PATH: reports/paper-protection-reconciliation.json
        run: python scripts/reconcile_paper_protection.py

      - name: Run Scanner preselection after portfolio review
        id: scanner_preselection
        working-directory: Manager_Agent
        run: |
          python scripts/run_scanner_preselection.py \
            --output reports/hourly-pre-backtest-discovery.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Run exact Backtest and publish to runtime Database_Agent
        if: steps.scanner_preselection.outputs.backtest_symbols != ''
        working-directory: Manager_Agent
        env:
          DATABASE_AGENT_URL: ${{ env.RUNTIME_DATABASE_AGENT_URL }}
          PUBLISH_TO_DATABASE: "true"
          BACKTEST_ACCOUNT_ID: "1"
          BACKTEST_SYMBOLS: ${{ steps.scanner_preselection.outputs.backtest_symbols }}
        run: |
          python -m pip install --disable-pip-version-check -r ../Backtest_Agent/requirements.txt
          python ../Backtest_Agent/scripts/run_hourly_backtest.py > reports/hourly-backtest-console.json
          python scripts/verify_backtest_publish.py reports/hourly-backtest-result.json

      - name: Run Manager candidate, Risk and guarded Execution cycle
        working-directory: Manager_Agent
        env:
          MANAGER_AGENT_URL: http://localhost:8000
          EXECUTION_AGENT_URL: http://localhost:8006
          DATABASE_AGENT_URL: ${{ env.RUNTIME_DATABASE_AGENT_URL }}
        run: python scripts/hourly_portfolio_cycle.py trade

      - name: Verify fills, protection and post-execution reconciliation
        working-directory: Manager_Agent
        env:
          EXECUTION_AGENT_URL: http://localhost:8006
          DATABASE_AGENT_URL: ${{ env.RUNTIME_DATABASE_AGENT_URL }}
        run: python scripts/hourly_portfolio_cycle.py finalize

      - name: Render operator report
        if: always()
        working-directory: Manager_Agent
        run: |
          if [ -f reports/hourly-portfolio-cycle.json ]; then
            cp reports/hourly-portfolio-cycle.json reports/hourly-auto-trading-report.json
            PYTHONPATH=. python scripts/render_hourly_portfolio_report.py || true
          fi

      - name: Upload hourly portfolio audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-auto-trading-report
          path: Manager_Agent/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Send hourly email report
        if: always()
        continue-on-error: true
        working-directory: Manager_Agent
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_SUBJECT: "Hourly Alpaca Paper Portfolio #${{ github.run_number }}"
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORTS_DIR: reports
        run: |
          if [ -n "${SMTP_SERVER}" ] && [ -n "${SMTP_USERNAME}" ] && [ -n "${SMTP_PASSWORD}" ] && [ -n "${EMAIL_TO}" ]; then
            python scripts/send_workflow_email.py
          else
            echo "Email secrets are not configured; artifact remains the authoritative report."
          fi

      - name: Show fail-closed diagnostics
        if: failure()
        working-directory: Manager_Agent
        run: |
          docker compose ps || true
          docker compose logs --tail=180 manager-agent execution-agent risk-agent portfolio-agent profit-agent performance-agent market-regime-agent || true

      - name: Stop stack
        if: always()
        continue-on-error: true
        working-directory: Manager_Agent
        run: docker compose down -v
