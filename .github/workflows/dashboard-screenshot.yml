name: Dashboard Screenshot

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/dashboard_routes.py"
      - "app/__init__.py"
      - "scripts/capture_dashboard_screenshot.py"
      - ".github/workflows/dashboard-screenshot.yml"

jobs:
  dashboard-screenshot:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      DATABASE_AGENT_URL: http://127.0.0.1:9999
      TRADING_ENABLED: "false"
      TRADING_MODE: PAPER
      APPLY_LEARNING_DELTAS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.prod.base.txt playwright
          python -m playwright install --with-deps chromium

      - name: Start Manager dashboard server
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > manager-dashboard.log 2>&1 &
          echo $! > manager-dashboard.pid
          sleep 5
          curl -fsS http://127.0.0.1:8000/dashboard > /dev/null

      - name: Capture dashboard screenshot and data
        run: |
          mkdir -p dashboard-artifacts
          curl -fsS "http://127.0.0.1:8000/dashboard/data?account_id=1" -o dashboard-artifacts/dashboard-data.json
          python scripts/capture_dashboard_screenshot.py

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: thai-dashboard-screenshot
          path: |
            dashboard-artifacts/dashboard-screenshot.png
            dashboard-artifacts/dashboard-data.json
            manager-dashboard.log
          if-no-files-found: error

      - name: Stop Manager dashboard server
        if: always()
        run: |
          if [ -f manager-dashboard.pid ]; then
            python -c "import os, signal; pid=int(open('manager-dashboard.pid').read()); os.kill(pid, signal.SIGTERM)"
          fi
