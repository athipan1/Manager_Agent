name: Alpha Advisory Smoke Test

on:
  workflow_dispatch:

jobs:
  alpha-advisory-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRADING_ENABLED: "false"
      DRY_RUN: "true"
      BROKER_MODE: SIMULATOR
      ALPHA_AGENTS_ENABLED: "true"
      MARKET_REGIME_AGENT_ENABLED: "true"
      PORTFOLIO_AGENT_ENABLED: "true"
      PROFIT_AGENT_ENABLED: "true"
      PERFORMANCE_AGENT_ENABLED: "true"
      PORTFOLIO_AGENT_API_KEY: dev_portfolio_key

    steps:
      - name: Checkout Manager_Agent
        uses: actions/checkout@v4
        with:
          path: Manager_Agent

      - name: Checkout Market_Regime_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Market_Regime_Agent
          ref: main
          path: Market_Regime_Agent
          fetch-depth: 1

      - name: Checkout Portfolio_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Portfolio_Agent
          ref: main
          path: Portfolio_Agent
          fetch-depth: 1

      - name: Checkout Profit_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Profit_Agent
          ref: main
          path: Profit_Agent
          fetch-depth: 1

      - name: Checkout Performance_Agent
        uses: actions/checkout@v4
        with:
          repository: athipan1/Performance_Agent
          ref: main
          path: Performance_Agent
          fetch-depth: 1

      - name: Build alpha agent images
        working-directory: Manager_Agent
        run: |
          docker build -t painaidee/market-regime-agent:latest ../Market_Regime_Agent
          docker build -t painaidee/portfolio-agent:latest ../Portfolio_Agent
          docker build -t painaidee/profit-agent:latest ../Profit_Agent
          docker build -t painaidee/performance-agent:latest ../Performance_Agent

      - name: Start alpha agents
        run: |
          docker run -d --name market-regime-agent -p 8014:8014 painaidee/market-regime-agent:latest
          docker run -d --name portfolio-agent -p 8012:8012 \
            -e PORTFOLIO_AGENT_API_KEY="$PORTFOLIO_AGENT_API_KEY" \
            painaidee/portfolio-agent:latest
          docker run -d --name profit-agent -p 8011:8011 painaidee/profit-agent:latest
          docker run -d --name performance-agent -p 8013:8013 painaidee/performance-agent:latest

      - name: Wait for alpha agents
        run: |
          for i in {1..30}; do
            market=$(curl -fsS http://localhost:8014/health >/dev/null && echo ok || echo wait)
            portfolio=$(curl -fsS http://localhost:8012/health >/dev/null && echo ok || echo wait)
            profit=$(curl -fsS http://localhost:8011/health >/dev/null && echo ok || echo wait)
            performance=$(curl -fsS http://localhost:8013/health >/dev/null && echo ok || echo wait)
            echo "alpha health: market=$market portfolio=$portfolio profit=$profit performance=$performance"
            if [ "$market$portfolio$profit$performance" = "okokokok" ]; then
              exit 0
            fi
            sleep 3
          done
          docker logs market-regime-agent || true
          docker logs portfolio-agent || true
          docker logs profit-agent || true
          docker logs performance-agent || true
          exit 1

      - name: Call alpha advisory endpoints directly
        run: |
          curl -fsS http://localhost:8014/market/regime \
            -H "Content-Type: application/json" \
            -d '{"symbol":"SPY","price":550,"sma_50":530,"sma_200":500,"atr_pct":0.015,"vix":15,"market_breadth_pct":0.7}'
          curl -fsS http://localhost:8012/portfolio/exposure \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: $PORTFOLIO_AGENT_API_KEY" \
            -H "X-Correlation-ID: alpha-smoke-portfolio" \
            -d '{"equity":100000,"cash":20000,"mode":"normal","positions":[{"symbol":"ACGL","market_value":10000,"strategy_bucket":"value_rebound"},{"symbol":"SPY","market_value":70000,"strategy_bucket":"core_dividend"}]}'
          curl -fsS http://localhost:8011/profit/plan \
            -H "Content-Type: application/json" \
            -d '{"position":{"symbol":"ADBE","quantity":20,"entry_price":100,"current_price":120,"stop_loss":90}}'
          curl -fsS http://localhost:8013/performance/report \
            -H "Content-Type: application/json" \
            -d '{"initial_equity":100000,"trades":[],"equity_curve":[]}'

      - name: Stop containers
        if: always()
        run: |
          docker rm -f market-regime-agent portfolio-agent profit-agent performance-agent || true
