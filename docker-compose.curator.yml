services:
  manager-agent:
    environment:
      CURATOR_AGENT_ENABLED: ${CURATOR_AGENT_ENABLED:-false}
      CURATOR_AGENT_URL: http://curator-agent:8010
      CURATOR_AGENT_TIMEOUT: ${CURATOR_AGENT_TIMEOUT:-5}
      CURATOR_AGENT_MAX_RETRIES: ${CURATOR_AGENT_MAX_RETRIES:-1}
      CURATOR_AGENT_FAILURE_THRESHOLD: ${CURATOR_AGENT_FAILURE_THRESHOLD:-2}
      CURATOR_AGENT_COOLDOWN_SECONDS: ${CURATOR_AGENT_COOLDOWN_SECONDS:-30}
      CURATOR_SKILL_TIMEOUT_SECONDS: ${CURATOR_SKILL_TIMEOUT_SECONDS:-1.0}
    depends_on:
      curator-agent:
        condition: service_healthy

  backtest-agent:
    profiles: []
    image: python:3.11-slim
    restart: always
    ports:
      - "8016:8016"
    command: >
      python -c "from http.server import BaseHTTPRequestHandler, HTTPServer;
      import json;
      class H(BaseHTTPRequestHandler):
        def do_GET(self):
          self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers();
          self.wfile.write(json.dumps({'status':'ok','service':'backtest-agent-placeholder'}).encode());
        def log_message(self, *args): pass;
      HTTPServer(('0.0.0.0', 8016), H).serve_forever()"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8016/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  market-regime-agent:
    profiles: []
    image: python:3.11-slim
    restart: always
    ports:
      - "8014:8014"
    command: >
      python -c "from http.server import BaseHTTPRequestHandler, HTTPServer;
      import json;
      class H(BaseHTTPRequestHandler):
        def do_GET(self):
          self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers();
          self.wfile.write(json.dumps({'status':'ok','service':'market-regime-agent-placeholder'}).encode());
        def log_message(self, *args): pass;
      HTTPServer(('0.0.0.0', 8014), H).serve_forever()"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8014/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  curator-agent:
    build:
      context: ../Curator_Agent
      dockerfile: Dockerfile
    image: painaidee/curator-agent:latest
    restart: always
    ports:
      - "8010:8010"
    environment:
      CURATOR_DB_PATH: /data/curator_skills.sqlite3
      PYTHONPATH: /app
    volumes:
      - curator_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8010/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  curator_data:
