services:
  manager-agent:
    environment:
      CURATOR_AGENT_ENABLED: ${CURATOR_AGENT_ENABLED:-true}
      CURATOR_AGENT_URL: http://curator-agent:8010
      CURATOR_AGENT_TIMEOUT: ${CURATOR_AGENT_TIMEOUT:-5}
      CURATOR_AGENT_MAX_RETRIES: ${CURATOR_AGENT_MAX_RETRIES:-1}
      CURATOR_AGENT_FAILURE_THRESHOLD: ${CURATOR_AGENT_FAILURE_THRESHOLD:-2}
      CURATOR_AGENT_COOLDOWN_SECONDS: ${CURATOR_AGENT_COOLDOWN_SECONDS:-30}
      CURATOR_SKILL_TIMEOUT_SECONDS: ${CURATOR_SKILL_TIMEOUT_SECONDS:-1.0}
    depends_on: !override
      technical-agent:
        condition: service_healthy
      fundamental-agent:
        condition: service_healthy
      scanner-agent:
        condition: service_healthy
      database-agent:
        condition: service_healthy
      risk-agent:
        condition: service_healthy
      performance-agent:
        condition: service_healthy
      learning-agent:
        condition: service_healthy
      execution-agent:
        condition: service_healthy
      curator-agent:
        condition: service_healthy

  database-agent:
    environment:
      # Canonical deployment seed for broker holdings that predate the current
      # ephemeral workflow database. Override this variable with additional
      # SYMBOL=bucket pairs as holdings are migrated.
      STRATEGY_BUCKET_ASSIGNMENTS_JSON: ${STRATEGY_BUCKET_ASSIGNMENTS_JSON:-CINF=value_rebound}

  performance-agent: !override
    image: python:3.11-slim
    restart: always
    ports:
      - "8013:8013"
    command: ["sh", "-c", "printf 'ok' > health && python -u -m http.server 8013 --bind 0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8013/health', timeout=3).read()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  curator-agent:
    build:
      context: ../Curator_Agent
      dockerfile: Dockerfile
    image: painaidee/curator-agent:latest
    restart: always
    ports:
      - "8010:8010"
    environment:
      CURATOR_DB_PATH: /data/curator_skills.sqlite3
      CURATOR_SEED_BACKTEST_SKILL: ${CURATOR_SEED_BACKTEST_SKILL:-true}
      CURATOR_SEED_BACKTEST_SKILL_ID: ${BACKTEST_SKILL_ID:-hourly-sma-crossover}
      CURATOR_SEED_BACKTEST_SKILL_APPROVED: ${CURATOR_SEED_BACKTEST_SKILL_APPROVED:-true}
      PYTHONPATH: /app
    volumes:
      - curator_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8010/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  curator_data:
