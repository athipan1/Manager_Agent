services:
  manager-agent:
    environment:
      CURATOR_AGENT_ENABLED: ${CURATOR_AGENT_ENABLED:-false}
      CURATOR_AGENT_URL: http://curator-agent:8010
      CURATOR_AGENT_TIMEOUT: ${CURATOR_AGENT_TIMEOUT:-5}
      CURATOR_AGENT_MAX_RETRIES: ${CURATOR_AGENT_MAX_RETRIES:-1}
      CURATOR_AGENT_FAILURE_THRESHOLD: ${CURATOR_AGENT_FAILURE_THRESHOLD:-2}
      CURATOR_AGENT_COOLDOWN_SECONDS: ${CURATOR_AGENT_COOLDOWN_SECONDS:-30}
      CURATOR_SKILL_TIMEOUT_SECONDS: ${CURATOR_SKILL_TIMEOUT_SECONDS:-1.0}
    depends_on: !override
      technical-agent:
        condition: service_healthy
      fundamental-agent:
        condition: service_healthy
      scanner-agent:
        condition: service_healthy
      database-agent:
        condition: service_healthy
      risk-agent:
        condition: service_healthy
      performance-agent:
        condition: service_healthy
      learning-agent:
        condition: service_healthy
      execution-agent:
        condition: service_healthy
      curator-agent:
        condition: service_healthy

  performance-agent: !override
    image: python:3.11-slim
    restart: always
    ports:
      - "8013:8013"
    command: |
      sh -c "cat > /tmp/performance_placeholder.py <<'PY'
      import json
      from http.server import BaseHTTPRequestHandler, HTTPServer

      class Handler(BaseHTTPRequestHandler):
          def _send(self, payload):
              body = json.dumps(payload).encode('utf-8')
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.send_header('Content-Length', str(len(body)))
              self.end_headers()
              self.wfile.write(body)

          def do_GET(self):
              self._send({
                  'status': 'ok',
                  'agent_type': 'performance',
                  'data': {'curator_stack_placeholder': True},
                  'error': None,
              })

          def do_POST(self):
              length = int(self.headers.get('Content-Length', '0') or '0')
              if length:
                  self.rfile.read(length)
              self._send({
                  'status': 'success',
                  'agent_type': 'performance',
                  'data': {'approved': True, 'curator_stack_placeholder': True},
                  'error': None,
              })

          def log_message(self, *args):
              return

      HTTPServer(('0.0.0.0', 8013), Handler).serve_forever()
      PY
      python /tmp/performance_placeholder.py"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8013/health', timeout=3).read()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  curator-agent:
    build:
      context: ../Curator_Agent
      dockerfile: Dockerfile
    image: painaidee/curator-agent:latest
    restart: always
    ports:
      - "8010:8010"
    environment:
      CURATOR_DB_PATH: /data/curator_skills.sqlite3
      PYTHONPATH: /app
    volumes:
      - curator_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8010/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  curator_data:
