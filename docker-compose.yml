version: '3.8'

services:
  orchestrator:
    build: .
    ports:
      - "8080:80" # Expose orchestrator on host port 8080
    environment:
      - TECHNICAL_AGENT_URL=http://technical-agent:8002/analyze
      - FUNDAMENTAL_AGENT_URL=http://fundamental-agent:8001/analyze
    depends_on:
      - technical-agent
      - fundamental-agent

  technical-agent:
    build:
      context: https://github.com/athipan1/Technical_Agent.git#main
    ports:
      - "8000:8000"

  fundamental-agent:
    build:
      context: https://github.com/athipan1/Fundamental_Agent.git#main
    ports:
      - "8001:8001"
