services:

  base:

    profiles:

      - build

    build:

      context: .

      dockerfile: base.Dockerfile

    image: painaidee-base:latest

  manager-agent:

    build:

      context: .

      dockerfile: Dockerfile

    image: painaidee/manager-agent:latest

    restart: always

    ports:

      - "8000:80"

    healthcheck:

      test: ["CMD", "python", "/app/healthcheck.py"]

      interval: 10s

      timeout: 3s

      retries: 5

      start_period: 30s

    environment:

      TRADING_ENABLED: ${TRADING_ENABLED:-true}

      TRADING_MODE: ${TRADING_MODE:-PAPER}

      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}

      DRY_RUN: ${DRY_RUN:-true}

      BROKER_MODE: ${BROKER_MODE:-SIMULATOR}

      TECHNICAL_AGENT_URL: http://technical-agent:8002

      FUNDAMENTAL_AGENT_URL: http://fundamental-agent:8001

      SCANNER_AGENT_URL: http://scanner-agent:8003

      DATABASE_AGENT_URL: http://database-agent:8004

      RISK_AGENT_URL: http://risk-agent:8007

      BACKTEST_AGENT_URL: http://backtest-agent:8016

      PERFORMANCE_AGENT_URL: http://performance-agent:8013

      AUTO_LEARNING_AGENT_URL: http://learning-agent:8005

      EXECUTION_AGENT_URL: http://execution-agent:8006

      BACKTEST_AGENT_ENABLED: ${BACKTEST_AGENT_ENABLED:-false}

      BACKTEST_EXECUTION_GATE_REQUIRED: ${BACKTEST_EXECUTION_GATE_REQUIRED:-false}

      BACKTEST_GATE_SKILL_ID: ${BACKTEST_GATE_SKILL_ID:-hourly-sma-crossover}

      BACKTEST_GATE_STRATEGY_ID: ${BACKTEST_GATE_STRATEGY_ID:-hourly-sma-crossover}

      BACKTEST_GATE_TIMEFRAME: ${BACKTEST_GATE_TIMEFRAME:-1d}

      BACKTEST_GATE_MAX_AGE_HOURS: ${BACKTEST_GATE_MAX_AGE_HOURS:-26}

      ALPHA_AGENTS_ENABLED: ${ALPHA_AGENTS_ENABLED:-true}

      MARKET_REGIME_AGENT_ENABLED: ${MARKET_REGIME_AGENT_ENABLED:-false}

      MARKET_REGIME_AGENT_URL: http://market-regime-agent:8014

      MARKET_REGIME_AGENT_TIMEOUT: 10

      PERFORMANCE_AGENT_ENABLED: ${PERFORMANCE_AGENT_ENABLED:-true}

      PERFORMANCE_SESSION_RISK_ENABLED: ${PERFORMANCE_SESSION_RISK_ENABLED:-true}

      PERFORMANCE_SESSION_RISK_REQUIRED: ${PERFORMANCE_SESSION_RISK_REQUIRED:-false}

      PERFORMANCE_SESSION_RISK_FILL_LIMIT: ${PERFORMANCE_SESSION_RISK_FILL_LIMIT:-500}

      DATABASE_AGENT_API_KEY: ${DATABASE_AGENT_API_KEY:-dev_database_key}

      EXECUTION_API_KEY: dev_execution_key

      PORTFOLIO_AGENT_API_KEY: ${PORTFOLIO_AGENT_API_KEY:-dev_portfolio_key}

      DEFAULT_ACCOUNT_ID: 1

      RISK_PER_TRADE: 0.01

      STOP_LOSS_PERCENTAGE: 0.03

      MAX_POSITION_PERCENTAGE: 0.20

      ENABLE_TECHNICAL_STOP: "true"

      MAX_TOTAL_EXPOSURE: 0.50

      PER_REQUEST_RISK_BUDGET: 0.05

      MIN_POSITION_VALUE: 500.0

      TECHNICAL_AGENT_WEIGHT: 0.5

      FUNDAMENTAL_AGENT_WEIGHT: 0.5

      LEARNING_MODE: conservative

      WINDOW_SIZE: 50

      DB_CLIENT_TIMEOUT: 10

      DB_CLIENT_MAX_RETRIES: 3

      DB_CLIENT_BACKOFF_FACTOR: 0.5

      DB_CLIENT_FAILURE_THRESHOLD: 5

      DB_CLIENT_COOLDOWN_PERIOD: 30

      AGENT_CLIENT_TIMEOUT: 10

      AGENT_CLIENT_MAX_RETRIES: 3

      AGENT_CLIENT_BACKOFF_FACTOR: 0.5

      AGENT_CLIENT_FAILURE_THRESHOLD: 5

      AGENT_CLIENT_COOLDOWN_PERIOD: 30
