services:
  base:
    profiles:
      - build
    build:
      context: .
      dockerfile: base.Dockerfile
    image: painaidee-base:latest

  manager-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: painaidee/manager-agent:latest
    restart: always
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    environment:
      TRADING_ENABLED: ${TRADING_ENABLED:-true}
      TRADING_MODE: ${TRADING_MODE:-PAPER}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      DRY_RUN: ${DRY_RUN:-true}
      BROKER_MODE: ${BROKER_MODE:-SIMULATOR}
      TECHNICAL_AGENT_URL: http://technical-agent:8002
      FUNDAMENTAL_AGENT_URL: http://fundamental-agent:8001
      SCANNER_AGENT_URL: http://scanner-agent:8003
      DATABASE_AGENT_URL: http://database-agent:8004
      RISK_AGENT_URL: http://risk-agent:8007
      DATABASE_AGENT_API_KEY: dev_database_key
      AUTO_LEARNING_AGENT_URL: http://learning-agent:8005
      EXECUTION_AGENT_URL: http://execution-agent:8006
      EXECUTION_API_KEY: dev_execution_key
      DEFAULT_ACCOUNT_ID: 1
      RISK_PER_TRADE: 0.01
      STOP_LOSS_PERCENTAGE: 0.03
      MAX_POSITION_PERCENTAGE: 0.20
      ENABLE_TECHNICAL_STOP: "true"
      MAX_TOTAL_EXPOSURE: 0.50
      PER_REQUEST_RISK_BUDGET: 0.05
      MIN_POSITION_VALUE: 500.0
      TECHNICAL_AGENT_WEIGHT: 0.5
      FUNDAMENTAL_AGENT_WEIGHT: 0.5
      LEARNING_MODE: conservative
      WINDOW_SIZE: 50
      DB_CLIENT_TIMEOUT: 10
      DB_CLIENT_MAX_RETRIES: 3
      DB_CLIENT_BACKOFF_FACTOR: 0.5
      DB_CLIENT_FAILURE_THRESHOLD: 5
      DB_CLIENT_COOLDOWN_PERIOD: 30
      AGENT_CLIENT_TIMEOUT: 10
      AGENT_CLIENT_MAX_RETRIES: 3
      AGENT_CLIENT_BACKOFF_FACTOR: 0.5
      AGENT_CLIENT_FAILURE_THRESHOLD: 5
      AGENT_CLIENT_COOLDOWN_PERIOD: 30
      RISK_AGENT_TIMEOUT: 10
      RISK_AGENT_FAILURE_THRESHOLD: 3
      RISK_AGENT_COOLDOWN_SECONDS: 30
      ASSET_BIASES: "{}"
    depends_on:
      technical-agent:
        condition: service_healthy
      fundamental-agent:
        condition: service_healthy
      scanner-agent:
        condition: service_healthy
      database-agent:
        condition: service_healthy
      risk-agent:
        condition: service_healthy
      learning-agent:
        condition: service_healthy
      execution-agent:
        condition: service_healthy

  scanner-agent:
    build:
      context: ../Scanner_Agent
      dockerfile: Dockerfile
    image: painaidee/scanner-agent:latest
    restart: always
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      PORT: 8003
      SCANNER_DEV_MODE: "true"
      PYTHONPATH: /code

  technical-agent:
    build:
      context: ../Technical_Agent
      dockerfile: Dockerfile
    image: painaidee/technical-agent:latest
    restart: always
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      PORT: 8002
      TECHNICAL_AGENT_API_KEY: dev_technical_key
      PYTHONPATH: /app
      NUMBA_DISABLE_JIT: "1"

  fundamental-agent:
    build:
      context: ../Fundamental_Agent
      dockerfile: Dockerfile
    image: painaidee/fundamental-agent:latest
    restart: always
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      PORT: 8001
      FUNDAMENTAL_AGENT_API_KEY: dev_fundamental_key
      PYTHONPATH: /app

  database-agent:
    build:
      context: ../Database_Agent
      dockerfile: Dockerfile
    image: painaidee/database-agent:latest
    restart: always
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8004/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 90s
    environment:
      PORT: 8004
      DATABASE_AGENT_API_KEY: dev_database_key
      DATABASE_DEV_MODE: "true"
      USE_SQLITE: "true"
      ALPACA_API_KEY: dev_alpaca_key
      ALPACA_SECRET_KEY: dev_alpaca_secret
    volumes:
      - ./data:/app/data

  risk-agent:
    build:
      context: ../Risk_Agent
      dockerfile: Dockerfile
    image: painaidee/risk-agent:latest
    restart: always
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8007/health', timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      PORT: 8007
      ASSET_CLASS: ${ASSET_CLASS:-stock}
      STOCK_ONLY_MODE: ${STOCK_ONLY_MODE:-true}
      ALLOW_SHORT_SELLING: ${ALLOW_SHORT_SELLING:-false}
      ALLOW_FRACTIONAL_SHARES: ${ALLOW_FRACTIONAL_SHARES:-false}
      MAX_POSITION_PCT: ${RISK_MAX_POSITION_PCT:-0.10}
      MAX_TRADE_LOSS_PCT: ${RISK_MAX_TRADE_LOSS_PCT:-0.01}
      MAX_TOTAL_EXPOSURE_PCT: ${RISK_MAX_TOTAL_EXPOSURE_PCT:-0.50}
      MAX_MARGIN_MULTIPLIER: ${RISK_MAX_MARGIN_MULTIPLIER:-1.00}
      MAX_DAILY_LOSS_PCT: ${RISK_MAX_DAILY_LOSS_PCT:-0.005}
      MAX_WEEKLY_LOSS_PCT: ${RISK_MAX_WEEKLY_LOSS_PCT:-0.015}
      MAX_CONSECUTIVE_LOSSES: ${RISK_MAX_CONSECUTIVE_LOSSES:-3}
      MAX_TRADES_PER_DAY: ${RISK_MAX_TRADES_PER_DAY:-5}
      MAX_SYMBOL_TRADES_PER_DAY: ${RISK_MAX_SYMBOL_TRADES_PER_DAY:-2}
      EMERGENCY_HALT: ${RISK_EMERGENCY_HALT:-false}
      PYTHONPATH: /app

  learning-agent:
    build:
      context: ../Learning_Agent
      dockerfile: Dockerfile
    image: painaidee/learning-agent:latest
    restart: always
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      PORT: 8005
      LEARNING_AGENT_API_KEY: dev_learning_key
      LEARNING_DEV_MODE: "true"
      USE_SQLITE: "true"
      PYTHONPATH: /home/app/web

  execution-agent:
    build:
      context: ../Execution_Agent
      dockerfile: Dockerfile
    image: painaidee/execution-agent:latest
    restart: always
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      PORT: 8006
      EXECUTION_AGENT_API_KEY: dev_execution_key
      API_KEY: dev_execution_key
      DB_AGENT_URL: http://database-agent:8004
      DATABASE_AGENT_API_KEY: dev_database_key
      TRADING_ENABLED: ${TRADING_ENABLED:-true}
      TRADING_MODE: ${TRADING_MODE:-PAPER}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      DRY_RUN: ${DRY_RUN:-true}
      BROKER_MODE: ${BROKER_MODE:-SIMULATOR}
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_API_URL: ${ALPACA_API_URL:-https://paper-api.alpaca.markets}
      PYTHONPATH: /home/appuser:/home/appuser/src
    depends_on:
      database-agent:
        condition: service_healthy

  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
