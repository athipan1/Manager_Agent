<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manager Agent Dashboard Snapshot</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5edf8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 30rem),
          radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.16), transparent 28rem),
          #020617;
      }
      main {
        width: min(760px, 100%);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 28px;
        padding: 32px;
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        letter-spacing: -0.06em;
      }
      p {
        color: #94a3b8;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        border-radius: 999px;
        padding: 12px 18px;
        color: #e0f2fe;
        background: rgba(14, 165, 233, 0.16);
        text-decoration: none;
        font-weight: 800;
      }
      code {
        color: #bae6fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Manager Agent Snapshot</h1>
      <p>
        This GitHub Pages site publishes the latest frontend-safe dashboard snapshot for the AI trading frontend.
      </p>
      <p>
        Snapshot path: <code>/dashboard/latest-dashboard-snapshot.json</code>
      </p>
      <a href="./dashboard/latest-dashboard-snapshot.json">Open latest dashboard snapshot JSON</a>
    </main>
  </body>
</html>
